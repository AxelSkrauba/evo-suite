[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "evo-gafs"
version = "0.1.0"
description = "Genetic Algorithm Feature Selector — a scikit-learn-compatible wrapper feature selector for tabular data (evo-suite)"
readme = "README.md"
requires-python = ">=3.9"
license = { text = "MIT" }
authors = [
    { name = "Axel Skrauba" },
]
keywords = [
    "feature selection",
    "genetic algorithm",
    "DEAP",
    "NSGA-II",
    "machine learning",
    "scikit-learn",
    "wrapper method",
    "evolutionary computation",
]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Intended Audience :: Science/Research",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.9",
    "Programming Language :: Python :: 3.10",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Operating System :: OS Independent",
]
dependencies = [
    "numpy>=1.24",
    "pandas>=1.5",
    "scikit-learn>=1.6",
    "deap>=1.4",
]

[project.optional-dependencies]
viz = ["matplotlib>=3.6"]
dev = [
    "pytest>=7.4",
    "pytest-cov>=4.1",
    "ruff>=0.6",
    "mypy>=1.8",
    "matplotlib>=3.6",
]

[project.urls]
Repository = "https://github.com/AxelSkrauba/evo-suite"
Documentation = "https://github.com/AxelSkrauba/evo-suite/tree/main/packages/evo-gafs"
"Bug Tracker" = "https://github.com/AxelSkrauba/evo-suite/issues"

[tool.setuptools.packages.find]
where = ["src"]

[tool.setuptools.package-data]
evo_gafs = ["py.typed"]

# ── Tooling ──────────────────────────────────────────────────────────────────

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
]

[tool.coverage.run]
source = ["evo_gafs"]
branch = true

[tool.coverage.report]
show_missing = true

[tool.ruff]
line-length = 100
target-version = "py39"
src = ["src", "tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = [
    "E501",  # line length handled by formatter
]

[tool.mypy]
python_version = "3.10"
warn_unused_configs = true
ignore_missing_imports = true
check_untyped_defs = true
