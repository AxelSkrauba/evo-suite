name: Publish

# Per-package release via tags of the form `<dist-name>-vX.Y.Z`, e.g. `evo-gafs-v0.1.0`.
# Publishing uses PyPI Trusted Publishing (OIDC) — no API tokens are stored.

on:
  push:
    tags:
      - "evo-gafs-v*"

permissions:
  contents: read

jobs:
  build:
    name: Build evo-gafs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      # `uv build <pkg>` writes artifacts to the workspace-root `dist/`.
      - name: Build distributions
        run: uv build packages/evo-gafs
      - name: Check metadata
        run: uvx twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: evo-gafs-dist
          path: dist/*

  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: testpypi
      url: https://test.pypi.org/project/evo-gafs/
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: evo-gafs-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  publish-pypi:
    name: Publish to PyPI
    needs: publish-testpypi
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/evo-gafs/
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: evo-gafs-dist
          path: dist
      - uses: pypa/gh-action-pypi-publish@release/v1
