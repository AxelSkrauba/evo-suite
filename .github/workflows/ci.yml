name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync workspace
        run: uv sync
      - name: Lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

  test:
    name: test · ${{ matrix.package }} · py${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [evo-gafs, evo-gpfe]
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync workspace
        run: uv sync --python ${{ matrix.python-version }}
      - name: Type-check (mypy)
        run: uv run mypy packages/${{ matrix.package }}/src
      # Fast tests on every Python; the heavier "slow" checks run once below.
      - name: Test (pytest)
        run: |
          uv run pytest packages/${{ matrix.package }} -m "not slow" \
            --cov=${{ matrix.package == 'evo-gafs' && 'evo_gafs' || 'evo_gpfe' }} \
            --cov-report=term-missing

  slow-checks:
    name: slow checks · ${{ matrix.package }} (check_estimator + examples)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        package: [evo-gafs, evo-gpfe]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync workspace
        run: uv sync
      - name: Run slow tests
        run: uv run pytest packages/${{ matrix.package }} -m slow

  docs:
    name: Build docs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Sync docs environment
        run: uv sync --group docs
      - name: Build (warnings as errors)
        run: uv run sphinx-build -W -b html docs docs/_build/html

  build:
    name: Build distributions · ${{ matrix.package }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        package: [evo-gafs, evo-gpfe]
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
      # `uv build <pkg>` writes artifacts to the workspace-root `dist/`; build
      # each package into its own directory so the matrix jobs don't collide.
      - name: Build ${{ matrix.package }}
        run: uv build packages/${{ matrix.package }} -o dist/${{ matrix.package }}
      - name: Check metadata
        run: uvx twine check dist/${{ matrix.package }}/*
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.package }}-dist
          path: dist/${{ matrix.package }}/*
